name: TravelOps CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js (for backend validation)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Install backend dependencies
      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm install

      # 4. Run backend (basic health test)
      - name: Test backend server
        working-directory: ./app/backend
        run: |
          node index.js &
          sleep 5

      # 5. Build backend Docker image
      - name: Build Backend Docker Image
        run: docker build -t travel-backend ./app/backend

      # 6. Build frontend Docker image
      - name: Build Frontend Docker Image
        run: docker build -t travel-frontend ./app/frontend

      # 7. Verify containers run (VERY IMPORTANT)
      - name: Run backend container test
        run: |
          docker run -d -p 3001:3000 --name test-backend travel-backend
          sleep 5
          curl http://localhost:3001

      # 8. Cleanup containers
      - name: Cleanup
        run: docker rm -f test-backend

      # 9. Final step
      - name: Pipeline Complete
        run: echo "CI pipeline completed successfully 🚀"